name: hrmis_appss
description: HRMIS - Human Resource Management Information System - Professional Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ─────────────────────────────────────────────
  provider: ^6.1.2

  # ─── UI & Fonts ───────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0

  # ─── Charts ───────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ─── Icons ────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # ─── Utilities ────────────────────────────────────────────────────
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  camera: ^0.11.0+2
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true